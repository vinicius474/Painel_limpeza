# =============================================================================
# Nginx — Painel de Limpeza
# Proxy reverso para o servidor Express (porta 3001)
# =============================================================================

# Resolver DNS para OCSP stapling e upstream — obrigatório com ssl_stapling_verify on
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# Zonas de rate limiting
limit_req_zone $binary_remote_addr zone=login_zone:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=global_zone:10m rate=60r/m;

# ── HTTP → HTTPS (redirect permanente) ───────────────────────────────────────
server {
    listen 80;
    server_name painel.rt-automations.com.br;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name painel.rt-automations.com.br;

    # ── Certificado SSL (Let's Encrypt via Certbot) ───────────────────────────
    ssl_certificate     /etc/letsencrypt/live/painel.rt-automations.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/painel.rt-automations.com.br/privkey.pem;

    # Configurações TLS seguras (Mozilla Modern)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_stapling              on;
    ssl_stapling_verify       on; # Requer o bloco resolver acima

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options              "DENY"                                always;
    add_header X-Content-Type-Options       "nosniff"                             always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag                 "noindex, nofollow"                   always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # Ocultar versão do Nginx
    server_tokens off;

    # Limite global de requests (proteção de base para todas as rotas)
    limit_req zone=global_zone burst=30 nodelay;

    # ── Timeouts do proxy ──────────────────────────────────────────────────────
    # Evitam que o Nginx fique pendurado indefinidamente se o Express não responder
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ── Rota de login (rate limit agressivo) ──────────────────────────────────
    location /auth/ {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Rotas de API (autenticadas pelo Express) ──────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=15 nodelay;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Restante das rotas (frontend estático + healthcheck) ──────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_vary       on;

    # ── Bloquear acesso a arquivos sensíveis ──────────────────────────────────
    location ~ /\.(env|git|gitignore|htpasswd) {
        deny all;
        return 404;
    }
}
